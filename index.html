<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#226346" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <title>Outside Feet — Visits</title>
    <style>
      /* Deliberately minimal — UI polish is explicitly out of Phase 1 scope. */
      body { font-family: system-ui, sans-serif; margin: 0; background: #f6f6f2; color: #1c1c1c; }
      #root { max-width: 480px; margin: 0 auto; padding: 16px; }
      h1 { font-size: 1.3rem; }
      button { font-size: 1rem; padding: 12px 16px; border-radius: 8px; border: 1px solid #226346;
               background: #226346; color: white; width: 100%; margin-top: 8px; }
      button.secondary { background: white; color: #226346; }
      button:disabled { opacity: 0.5; }
      input, select, textarea { font-size: 1rem; padding: 10px; width: 100%; box-sizing: border-box;
               border: 1px solid #bbb; border-radius: 8px; margin-top: 4px; }
      label { display: block; margin-top: 12px; font-weight: 600; }
      .card { background: white; border: 1px solid #ddd; border-radius: 10px; padding: 16px; margin-top: 16px; }
      .muted { color: #666; font-size: 0.9rem; }
      .error { color: #b00020; margin-top: 8px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
